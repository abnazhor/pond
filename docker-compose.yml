services:
  browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: unless-stopped

    ports:
      - "9223:3000"

    # shm_size: 1gb

    environment:
      TOKEN: ""
      CONCURRENT: 5
      TIMEOUT: 60000
      MAX_QUEUE_LENGTH: 20
      CORS: "true"
      ENABLE_DEBUGGER: "true"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
